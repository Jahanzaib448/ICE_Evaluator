<!DOCTYPE html>
<html>
<head>
    <title>Secure Login - ICE Target</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Secure Login</h2>
        <div id="error" class="error"></div>
        <form id="loginForm">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <p>🧮 <b>Captcha:</b> <span id="captchaDisplay">{{ captcha }}</span></p>
            <input type="text" name="captcha" placeholder="Answer" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        // ========== ANTI-BOT CHECK (Requirement 1) ==========
        if (navigator.webdriver) {
            document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:100px;'>Access Denied: Bot Detected</h1>";
            throw new Error("Bot Detection Triggered");
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            if (response.ok) {
                window.location.href = result.redirect;
            } else {
                document.getElementById('error').innerText = result.error;
            }
        });
    </script>
</body>
</html>
